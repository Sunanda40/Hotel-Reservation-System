<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!--  TOP HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow rounded">
        <a href="rooms.html" class="btn btn-outline-secondary">⬅ Back</a>
        <h4 class="mb-0"> Customer Booking</h4>
        <div></div> <!-- empty space for alignment -->
    </div>

    <!--  FORM -->
    <div class="card p-4 shadow">

        <input type="text" id="name" class="form-control mb-3" placeholder="Name">
        <input type="text" id="email" class="form-control mb-3" placeholder="Email">
        <input type="text" id="phone" class="form-control mb-3" placeholder="Phone">
        <input type="text" id="roomId" class="form-control mb-3" readonly>

        <button class="btn btn-success w-100" onclick="confirmBooking()">
            Confirm Booking
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
