<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="loadRooms()" class="bg-light">

<div class="container mt-4">

    <!-- ✅ HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow rounded">
        <a href="index.html" class="btn btn-outline-secondary">⬅ Back</a>

        <h4 class="mb-0">📊 Admin Dashboard</h4>

        <button onclick="logout()" class="btn btn-outline-danger">Logout</button>
    </div>

    <!-- ✅ TABLE -->
    <table class="table table-bordered table-hover text-center shadow">

        <thead class="table-dark">
            <tr>
                <th>Room No</th>
                <th>Type</th>
                <th>Price</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="tableData"></tbody>

    </table>

</div>

<script>
function loadRooms() {

    console.log("Loading admin data...");

    fetch("http://localhost:8080/admin/room-details")
    .then(res => res.json())
    .then(data => {

        console.log("DATA:", data); // 👈 check this in console

        let output = "";

        data.forEach(r => {

            let status = r.available
                ? '<span class="badge bg-success">Available</span>'
                : '<span class="badge bg-danger">Booked</span>';

            let actionBtn = r.available
                ? `<button class="btn btn-secondary btn-sm" disabled>--</button>`
                : `<button onclick="vacateRoom(${r.roomNo})" class="btn btn-warning btn-sm">Vacate</button>`;

            output += `
            <tr>
                <td>${r.roomNo}</td>
                <td>${r.type}</td>
                <td>₹${r.price}</td>
                <td>${r.name}</td>
                <td>${r.phone}</td>
                <td>${status}</td>
                <td>${actionBtn}</td>
            </tr>
            `;
        });

        document.getElementById("tableData").innerHTML = output;
    })
    .catch(err => console.error("ERROR:", err));
}

//  IMPORTANT
loadRooms();
setInterval(loadRooms, 3000);

function vacateRoom(id) {
    fetch("http://localhost:8080/rooms/vacate/" + id, {
        method: "PUT"
    })
    .then (() => {
        
        loadRooms();
    })
    .catch(err=> console.err(err));
}

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>
</body>
</html>
