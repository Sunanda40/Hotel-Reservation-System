<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rooms</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body onload="loadRooms()" class="bg-light">

<div class="container mt-4">

    <!-- TOP HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow rounded">
        <a href="index.html" class="btn btn-outline-secondary">⬅ Back</a>

        <h4 class="mb-0">🏨 Available Rooms</h4>

        
    </div>

    <!--  THIS WAS MISSING -->
    <div id="rooms" class="row"></div>

</div>

<script>
const BASE_URL = "http://localhost:8080";

function loadRooms() {

    console.log("Loading rooms...");

    fetch(BASE_URL + "/rooms/all")
        .then(res => res.json())
        .then(data => {

            console.log("DATA:", data);

            let output = "";

            data.forEach(room => {
                
                let status = room.available
                    ? '<span class="text-success">Available</span>'
                    : '<span class="text-danger">Booked</span>';

                // ✅ ADD THIS
                let action = room.available
                    ? `<button onclick="goToBooking(${room.id})" class="btn btn-success">Book</button>`
                    : `<button class="btn btn-danger" disabled>Booked</button>`;

                output += `
                <div class="col-md-3">
                    <div class="card p-3 text-center shadow">

                        <h5>Room ${room.id}</h5>
                        <p>${room.type}</p>
                        <p>Price: ₹${room.price}</p>

                        <p>${status}</p>

                        ${action}

                    </div>
                </div>
                `;
            });

            document.getElementById("rooms").innerHTML = output;
        })
        .catch(err => console.error(err));
}
function goToBooking(id) {
    localStorage.setItem("roomId", id);
    window.location.href = "booking.html";
}


</script>

</body>
</html>
